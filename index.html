<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Manchette Volleyball</title>
  <!-- build: release-1.1.0-auth-backend-2026-04-14 -->
  <meta name="description" content="Manchette Volleyball: inscrições, presença, times, histórico, ranking, relatórios e painel administrativo em PWA." />

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Export PNG -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Manchette Volleyball">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- /PWA -->

</head>

<body class="min-h-screen bg-gradient-to-br from-blue-50 to-orange-50">

<!-- PWA Install Button -->
<button id="btnInstallApp" class="fixed bottom-4 right-4 z-50 hidden px-4 py-3 rounded-xl shadow-lg bg-green-600 text-white font-semibold">
  📲 Instalar App
</button>
<!-- /PWA Install Button -->

  <div id="app" class="p-4 sm:p-6 max-w-6xl mx-auto">
    <div class="text-center py-12">
      <p class="text-gray-600">Carregando...</p>
    </div>
  </div>

  <!-- Modal Avaliação (oculta) -->
  <div id="ratingBack" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-lg p-4 sm:p-6">
      <div class="flex items-center justify-between gap-3">
        <h3 class="text-xl font-extrabold text-gray-800">Avaliar (oculto)</h3>
        <button id="btnRateClose" class="px-3 py-2 rounded-lg border hover:bg-gray-50">Fechar</button>
      </div>

      <div id="rateMe" class="mt-2 text-sm text-gray-700"></div>

      <div class="mt-4 grid gap-2">
        <label class="text-xs text-gray-500">Quem você avalia</label>
        <select id="rateTarget" class="px-3 py-2 rounded-lg border">
          <option value="">Selecione</option>
        </select>
      </div>

      <div class="mt-4 border rounded-xl p-3">
        <div class="text-sm font-semibold mb-2">Nota (5–10)</div>
        <div id="scoreRow" class="flex flex-wrap gap-2"></div>
      </div>

      <button id="btnSendRating" class="mt-4 w-full px-4 py-2 rounded-lg bg-purple-600 text-white hover:bg-purple-700 font-semibold">
        Enviar avaliação
      </button>

      <div class="mt-3 text-xs text-gray-500">
        As avaliações são ocultas (não exibimos quem avaliou quem). Você pode avaliar mesmo após iniciar uma nova rodada.
      </div>
    </div>
  </div>
  <script src="script_0.js"></script>



<script src="script_1.js"></script>
</body>
</html>
